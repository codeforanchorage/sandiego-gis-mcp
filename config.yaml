# OpenContext Configuration
# ==========================
#
# Worcester GIS MCP — derived from config-example.yaml.
#
# IMPORTANT: Enable ONLY ONE plugin per fork/deployment (One Fork = One MCP Server).
# See docs/ARCHITECTURE.md for details.

---
# Server metadata
server_name: "Worcester GIS MCP"
description: "City of Worcester GIS MCP server - Safe, conversational access to Worcester open data"
organization: "City of Worcester"

# Plugin configuration
# ====================
#
# IMPORTANT: Enable ONLY ONE plugin below
# For additional MCP servers, fork this repository again
#
plugins:
  # Built-in: CKAN (for CKAN-based open data portals)
  ckan:
    enabled: false # Set to true to use
    base_url: "https://data.example.gov/" # CKAN API base URL
    portal_url: "https://data.example.gov/" # Public portal URL
    city_name: "Your City" # City/organization name
    timeout: 120 # HTTP timeout in seconds
    # api_key: "${CKAN_API_KEY}"  # Optional: CKAN API key for authenticated requests

  # Built-in: ArcGIS Hub (for ArcGIS Hub open data portals)
  # Worcester's open data portal is an ArcGIS Hub site.
  arcgis:
    enabled: true # Set to true to use
    portal_url: "https://opendata.worcesterma.gov"
    city_name: "City of Worcester"
    timeout: 120
    geocoder_region: "Worcester, MA" # biases address geocoding to Worcester
    # token: "${ARCGIS_TOKEN}"  # Optional: Bearer token for private items

# AWS deployment settings
aws:
  region: "us-west-2" # AWS region for Lambda
  lambda_name: "worcester-gis-mcp" # Lambda function name
  lambda_memory: 512 # Lambda memory in MB (128-10240)
  lambda_timeout: 120 # Lambda timeout in seconds (max 900)

# Logging configuration
logging:
  level: "INFO" # Log level: DEBUG, INFO, WARNING, ERROR
  format: "json" # Log format: json or text
