# OpenContext Configuration
# ==========================
#
# San Diego GIS MCP — derived from config-example.yaml.
#
# IMPORTANT: Enable ONLY ONE plugin per fork/deployment (One Fork = One MCP Server).
# See docs/ARCHITECTURE.md for details.

---
# Server metadata
server_name: "San Diego Regional GIS MCP"
description: >-
  San Diego REGIONAL GIS MCP server - safe, conversational access to the
  SANDAG-hosted regional / SanGIS catalog (geo.sandag.org): parcels,
  floodplain, address points, regional transportation and land use.
  Authoritative City of San Diego municipal layers (MHPA, City base zoning,
  community-plan land use) live on the separate "San Diego City" server.
organization: "SANDAG/SanGIS"

# Plugin configuration
# ====================
#
# IMPORTANT: Enable ONLY ONE plugin below
# For additional MCP servers, fork this repository again
#
plugins:
  # Built-in: CKAN (for CKAN-based open data portals)
  ckan:
    enabled: false # Set to true to use
    base_url: "https://data.example.gov/" # CKAN API base URL
    portal_url: "https://data.example.gov/" # Public portal URL
    city_name: "Your City" # City/organization name
    timeout: 120 # HTTP timeout in seconds
    # api_key: "${CKAN_API_KEY}"  # Optional: CKAN API key for authenticated requests

  # Built-in: ArcGIS Enterprise portal
  # SANDAG/SanGIS regional GIS: portal search for discovery, with the
  # services directory as fallback; layers stored in EPSG:2230 (queries
  # pin outSR=4326).
  arcgis:
    enabled: true # Set to true to use
    portal_url: "https://geo.sandag.org/portal"
    services_url: "https://geo.sandag.org/server/rest/services"
    geocoder_url: "https://gis.sandag.org/sdgis/rest/services/SANDAG_COMPOSITE_LOCATOR/GeocodeServer"
    city_name: "the San Diego region"
    scope_note: >-
      This is the SANDAG/SanGIS REGIONAL catalog. Authoritative City of San
      Diego municipal layers (MHPA, City base zoning, community-plan land
      use) are NOT here -- they live on the separate 'San Diego City' MCP
      server; use that server for City municipal questions.
    timeout: 120
    geocoder_region: "San Diego, CA" # biases the US Census fallback geocoder
    # token: "${ARCGIS_TOKEN}"  # Optional: Bearer token for private items

# AWS deployment settings
aws:
  region: "us-west-2" # AWS region for Lambda
  lambda_name: "sandiego-gis-mcp" # Lambda function name
  lambda_memory: 512 # Lambda memory in MB (128-10240)
  lambda_timeout: 120 # Lambda timeout in seconds (max 900)

# Logging configuration
logging:
  level: "INFO" # Log level: DEBUG, INFO, WARNING, ERROR
  format: "json" # Log format: json or text
